global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - 'alert.rules.yml'
scrape_configs:
  - job_name: 'backend'
    metrics_path: 'api/v1/metrics'
    static_configs:
      - targets: ['backend:4000']

  - job_name: 'redis'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
